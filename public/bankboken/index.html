<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#efede9" />
  <title>Bankboken</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Climate+Crisis&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📒</text></svg>" />
</head>
<body>
  <!-- ============ LOCK SCREEN ============ -->
  <div id="lock" class="lock">
    <div class="lock-card">
      <h1>Bankboken</h1>
      <form id="lock-form" autocomplete="off">
        <input id="pw" type="password" placeholder="Lösenord" aria-label="Lösenord" />
        <button type="submit">Lås upp</button>
      </form>
      <p id="lock-error" class="error" hidden>Fel lösenord</p>
    </div>
  </div>

  <div id="identity" class="lock" hidden>
    <div class="lock-card identity-card">
      <h1>Bankboken</h1>
      <p>Vem är du på den här enheten?</p>
      <div class="identity-options">
        <button type="button" data-person="A">Helo</button>
        <button type="button" data-person="B">Halvis</button>
      </div>
    </div>
  </div>

  <!-- ============ APP ============ -->
  <div id="app" hidden>
    <header class="app-head">
      <span class="brand">Bankboken</span>
      <div class="app-meta">
        <button id="identity-change" type="button"></button>
        <span id="sync-dot" class="sync" title="Ansluter…">●</span>
      </div>
    </header>

    <main class="stack">
      <!-- Saldo -->
      <section class="card" id="saldo-card">
        <p class="eyebrow">Saldo</p>
        <h1 id="balance-heading">Läser in…</h1>
        <p class="sub" id="balance-sub"></p>

        <button id="settle-btn" class="btn-swish" aria-label="Reglera med Swish" hidden>
          <img class="swish-logo-img" src="swish-logo.svg" alt="Swish" />
        </button>

        <div id="settle-panel" class="settle-panel" hidden>
          <button id="confirm-settle" class="btn-confirm-settle" type="button">Markera som swishat</button>
        </div>
      </section>

      <!-- Ny utgift -->
      <section class="card">
        <h2>Ny utgift</h2>
        <form id="expense-form">
          <div class="field">
            <span class="field-label">Beskrivning</span>
            <div class="desc-row">
              <button type="button" id="icon-trigger" class="icon-trigger"
                      aria-haspopup="true" aria-expanded="false" title="Välj kategori">🧾</button>
              <input id="e-desc" type="text" placeholder="t.ex. Matvaror ICA" required maxlength="60" />
              <div id="icon-pop" class="icon-pop" hidden>
                <button type="button" data-icon="🛒" title="Matvaror">🛒</button>
                <button type="button" data-icon="🍽️" title="Restaurang">🍽️</button>
                <button type="button" data-icon="🍺" title="Alkohol">🍺</button>
                <button type="button" data-icon="⛽" title="Bensin">⛽</button>
                <button type="button" data-icon="✈️" title="Resa">✈️</button>
                <button type="button" data-icon="☕" title="Fika">☕</button>
                <button type="button" data-icon="🏠" title="Hem">🏠</button>
                <button type="button" data-icon="🎬" title="Nöje">🎬</button>
                <button type="button" data-icon="🛍️" title="Shopping">🛍️</button>
                <button type="button" data-icon="🧾" title="Övrigt">🧾</button>
              </div>
            </div>
          </div>

          <label class="field">
            <span class="field-label">Belopp</span>
            <div class="input-wrap">
              <input id="e-amount" type="number" inputmode="decimal" step="0.01" min="0.01" placeholder="0" required />
              <span class="suffix">kr</span>
            </div>
          </label>

          <label class="field date-field">
            <span class="field-label">Datum</span>
            <input id="e-date" type="date" required />
          </label>

          <div class="field">
            <span class="field-label">Betalat av</span>
            <div class="seg" id="e-payer">
              <button type="button" data-val="Helo" class="active">Helo</button>
              <button type="button" data-val="Halvis">Halvis</button>
            </div>
          </div>

          <div class="field">
            <span class="field-label">Delning</span>
            <div class="split-picker" id="e-split">
              <div class="seg split-presets">
                <button type="button" data-val="a">100% Helo</button>
                <button type="button" data-val="even" class="active">50 / 50</button>
                <button type="button" data-val="b">100% Halvis</button>
              </div>
              <button type="button" class="custom-split-button" data-val="custom">Anpassad</button>
            </div>
            <div id="custom-split" class="custom-split" hidden>
              <div class="custom-split-labels">
                <span class="custom-split-label">
                  <strong id="custom-a-name">Helo</strong>
                  <span id="custom-a-value">50% · 0,00 kr</span>
                </span>
                <span class="custom-split-label custom-split-label-right">
                  <strong id="custom-b-name">Halvis</strong>
                  <span id="custom-b-value">50% · 0,00 kr</span>
                </span>
              </div>
              <input id="e-custom-share" type="range" min="0" max="100" step="1" value="50" aria-label="Halvis andel" />
            </div>
          </div>

          <button type="submit" class="btn-primary"><span class="btn-icon" aria-hidden="true">+</span>Lägg till utgift</button>

          <p class="preview" id="split-preview" hidden></p>
        </form>
      </section>

      <!-- Historik -->
      <section class="card">
        <h2>Historik</h2>
        <p class="totals" id="totals" hidden></p>
        <ul id="history-list" class="history"></ul>
        <p id="history-empty" class="empty">Inga utgifter än. Lägg till er första ovan.</p>
      </section>
    </main>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
